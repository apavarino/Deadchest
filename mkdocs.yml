site_name: DeadChest Documentation
site_url: https://apavarino.github.io/Deadchest/
repo_url: https://github.com/apavarino/Deadchest
repo_name: apavarino/Deadchest

plugins:
  - search

theme:
  name: material
  language: en
  logo: assets/images/deadchest-logo-small.png
  favicon: assets/images/deadchest-logo-small.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/apavarino/Deadchest
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/jCsvJxS

copyright: Copyright © DeadChest

docs_dir: docs
site_dir: site
use_directory_urls: true

nav:
  - Getting Started:
      - Home: index.md
      - Download: download.md
      - Installation: installation.md
      - How It Works: how-it-works.md
  - Administration:
      - Configuration: configuration.md
      - Commands and Permissions: commands-and-perms.md
      - Customization: customization.md
      - WorldGuard Integration: worldguard.md
      - Troubleshooting: troubleshooting.md
  - Developer:
      - API: api.md
      - Contribution: contribution.md
